<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡白時鐘</title>
    <style>
        /* CSS：設定白色背景與黑色文字 */
        body {
            background-color: #f5f5f7; /* 舒服的淺灰白背景 */
            color: #1d1d1f;            /* 深色文字 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .clock-container {
            text-align: center;
            background: #ffffff;       /* 純白卡片 */
            padding: 40px 70px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* 微弱的陰影，讓卡片浮現 */
        }

        .date {
            font-size: 20px;
            color: #86868b;            /* 灰色字體 */
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .time {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="date" id="myDate">YYYY年 MM月 DD日</div>
        <div class="time" id="myTime">00:00:00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('myDate').innerText = `${year}年 ${month}月 ${date}日`;
            document.getElementById('myTime').innerText = `${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
